<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line of Sight Calculator | Premium Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #ec4899;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #06b6d4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .unit-selection {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .unit-option {
            flex: 1;
            position: relative;
        }

        .unit-option input {
            display: none;
        }

        .unit-label {
            display: block;
            text-align: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .unit-option input:checked + .unit-label {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-color: var(--text-muted);
        }

        .results {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 24px;
            border: 1px dashed var(--glass-border);
        }

        .results-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .result-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .result-value {
            font-weight: 700;
            color: white;
            font-size: 1rem;
        }

        .highlight {
            color: #fbbf24;
        }

        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

         
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Line Of Sight</h1>
        <p class="subtitle">Calculate the radio horizon and maximum line of sight between two stations.</p>
    </div>

    <div class="input-group">
        <label class="input-label" for="h1">Antenna Height (1st Station)</label>
        <input type="number" id="h1" class="input-field" placeholder="Enter height..." step="any">
    </div>

    <div class="input-group">
        <label class="input-label" for="h2">Antenna Height (2nd Station)</label>
        <input type="number" id="h2" class="input-field" placeholder="Enter height..." step="any">
    </div>

    <div class="input-label">Select Units</div>
    <div class="unit-selection">
        <div class="unit-option">
            <input type="radio" name="unit" id="unit-metres" value="metres" checked>
            <label for="unit-metres" class="unit-label">Metres</label>
        </div>
        <div class="unit-option">
            <input type="radio" name="unit" id="unit-feet" value="feet">
            <label for="unit-feet" class="unit-label">Feet</label>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-primary" onclick="calculate()">Calculate Now</button>
        <button class="btn btn-secondary" onclick="clearFields()">Clear All</button>
    </div>

    <div class="results">
        <div class="results-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            Results Overview
        </div>
        
        <div class="result-item">
            <span class="result-label">Radio Horizon (1st Station)</span>
            <span class="result-value"><span id="r1">0.00</span> Km</span>
        </div>
        
        <div class="result-item">
            <span class="result-label">Radio Horizon (2nd Station)</span>
            <span class="result-value"><span id="r2">0.00</span> Km</span>
        </div>
        
        <div class="result-item">
            <span class="result-label">Total Line Of Sight</span>
            <span class="result-value highlight"><span id="los">0.00</span> Km</span>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const h1Input = document.getElementById("h1").value;
        const h2Input = document.getElementById("h2").value;
        
        
        let h1 = h1Input === "" ? 0 : parseFloat(h1Input);
        let h2 = h2Input === "" ? 0 : parseFloat(h2Input);
        
        const unit = document.querySelector('input[name="unit"]:checked').value;

         
        const K = 4/3;

        
        if (unit === "feet") {
            h1 = h1 * 0.3048;
            h2 = h2 * 0.3048;
        }

        const d1 = 3.57 * Math.sqrt(K * h1);
        const d2 = 3.57 * Math.sqrt(K * h2);
        
        const total = d1 + d2;

        
        animateValue("r1", d1);
        animateValue("r2", d2);
        animateValue("los", total);
    }

    function animateValue(id, value) {
        const obj = document.getElementById(id);
        const start = parseFloat(obj.innerText) || 0;
        const end = value;
        const duration = 500;
        let startTimestamp = null;
        
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const current = progress * (end - start) + start;
            obj.innerText = current.toFixed(2);
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    function clearFields() {
        document.getElementById("h1").value = "";
        document.getElementById("h2").value = "";
        
        animateValue("r1", 0);
        animateValue("r2", 0);
        animateValue("los", 0);
    }

    
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            calculate();
        }
    });
</script>

</body>
</html>
